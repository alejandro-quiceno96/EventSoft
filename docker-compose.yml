

services:
  web:
    build: .
    container_name: eventsoft_web
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn pr_eventsoft.wsgi:application --bind 0.0.0.0:8000 --reload --timeout 120 --workers 3"